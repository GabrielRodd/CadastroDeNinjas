spring.application.name=CadastroDeNinjas

spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# Configurań§es do JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# Configuracoes do flyway
spring.flyway.enable=true
spring.flyway.locations=classpath:db/migrations
spring.flyway.baseline-on-migrate=true

# Resolve o erro: No more pattern data allowed after {*...}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Garante que o Spring nŃo tente validar o caminho interno do Swagger como uma rota de API
spring.web.resources.add-mappings=true

